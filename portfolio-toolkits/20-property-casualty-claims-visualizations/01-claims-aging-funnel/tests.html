<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Claims Aging and Status Funnel tests</title>
    <style>
      :root {
        --pass: #246b60;
        --fail: #b3402f;
        --space: 8px;
      }
      body {
        margin: 0;
        padding: calc(var(--space) * 4);
        font-family: "Segoe UI", system-ui, sans-serif;
        color: #143047;
        background: #f5f8fa;
      }
      h1 {
        font-size: 22px;
      }
      .summary {
        font-size: 18px;
        font-weight: 700;
        padding: calc(var(--space) * 2);
        border-radius: 8px;
        margin-bottom: calc(var(--space) * 3);
        display: inline-block;
      }
      .summary.pass {
        background: #e7f3f0;
        color: var(--pass);
      }
      .summary.fail {
        background: #fbece9;
        color: var(--fail);
      }
      .test-row {
        font-family: "Consolas", "Courier New", monospace;
        font-size: 14px;
        padding: calc(var(--space) * 1) calc(var(--space) * 2);
        border-bottom: 1px solid #e1e7ed;
        white-space: pre-wrap;
      }
      .test-row.pass {
        color: var(--pass);
      }
      .test-row.fail {
        color: var(--fail);
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <h1>Claims Aging and Status Funnel tests</h1>
    <div class="summary" id="summary">running...</div>
    <div id="results"></div>

    <script src="dist/aging.js"></script>
    <script src="dist/tests.js"></script>
  </body>
</html>
