<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>311 dashboard tests</title>
  <style>
    :root {
      --base: #1f3a5f;
      --accent: #e07a3f;
      --ink: #16263d;
      --ok: #1f7a4d;
      --bad: #b3331a;
      --line: #d7dee7;
      --bg: #eef2f6;
      --s1: 8px;
      --s2: 16px;
      --s3: 24px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.5;
    }
    .wrap { max-width: 760px; margin: 0 auto; padding: var(--s3); }
    h1 { color: var(--base); font-size: 24px; }
    .summary { font-size: 18px; font-weight: 700; padding: var(--s2); border-radius: 6px; }
    .summary.pass { background: #d8efe2; color: var(--ok); }
    .summary.fail { background: #f6d8c5; color: var(--bad); }
    ul { list-style: none; padding: 0; }
    li { padding: var(--s1) var(--s2); border-bottom: 1px solid var(--line); font-family: "Consolas", monospace; font-size: 14px; }
    li.pass { color: var(--ok); }
    li.fail { color: var(--bad); font-weight: 700; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>311 dashboard tests</h1>
    <p>These check the dashboard logic against the worked examples in the SQL specs.</p>
    <div id="results"></div>
  </div>

  <script src="dist/dashboard.js"></script>
  <script src="dist/tests.js"></script>
</body>
</html>
